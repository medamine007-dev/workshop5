<div class="list-container">
  <div class="list-header">
    <h2>Liste des Suggestions</h2>
    <a routerLink="/suggestions/add" class="btn-add">+ Nouvelle Suggestion</a>
  </div>

  <div *ngIf="suggestionList.length === 0" class="empty">Aucune suggestion disponible.</div>

  <div class="card" *ngFor="let s of suggestionList">
    <div class="card-body">
      <h3>{{ s.title }}</h3>
      <p>{{ s.description }}</p>
      <div class="meta">
        <span class="badge">{{ s.category }}</span>
        <span class="status">{{ s.status }}</span>
        <span class="likes">👍 {{ s.nbLikes }}</span>
      </div>
    </div>
    <div class="card-actions">
      <button (click)="viewDetails(s.id!)">Détails</button>
      <button (click)="likesSuggestion(s)" class="btn-like">Like</button>
      <button (click)="deleteSuggestion(s.id!)" class="btn-delete">Supprimer</button>
    </div>
  </div>
</div>
