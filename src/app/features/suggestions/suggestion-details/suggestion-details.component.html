<div class="details-container" *ngIf="suggestion">
  <h2>{{ suggestion.title }}</h2>
  <p class="description">{{ suggestion.description }}</p>
  <div class="meta">
    <span class="badge">{{ suggestion.category }}</span>
    <span>Statut : {{ suggestion.status }}</span>
    <span>👍 {{ suggestion.nbLikes }}</span>
    <span>{{ suggestion.date | date:'dd/MM/yyyy' }}</span>
  </div>
  <div class="actions">
    <button (click)="goToEdit()" class="btn-edit">Update</button>
    <button (click)="deleteSuggestion()" class="btn-delete">Supprimer</button>
    <a routerLink="/suggestions" class="btn-back">← Retour à la liste</a>
  </div>
</div>
<div *ngIf="!suggestion" class="loading">Chargement...</div>
